{% extends 'base.html'%}
{% load i18n %}
{% block content %}
<h3>{% trans 'Alert'%}</h3>
<form method="post">
  {% csrf_token %}
  <p class="text-muted my-4">
      {% trans 'Are you sure you want to delete this project?'%} {{project.title}}
  </p>
  <input class="btn btn-danger" type="submit" value="{% trans 'Delete' %}" />
  <a href="{% url 'project_list' %}" class="btn btn-secondary">{%trans 'Cancel'%}</a>
</form>

{% endblock %}
