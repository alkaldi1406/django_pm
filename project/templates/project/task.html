{% load i18n %}
<ul class="list-group list-group-flush">
  {% for task in project.task_set.all %}
  <li class="list-group-item d-flex justify-content-between align-items-center">
    <form method="post" action="{% url 'task_update' task.id%}" class="my-auto me-2">
      {% csrf_token %}
      <input
          class="check-input"
          type="checkbox"
          name="is_completed"
          {% if task.is_completed %} checked {% endif %}
          onchange="this.form.submit()"
      />
    </form>
      <p class="my-auto me-auto">
        {{ task.description }}
      </p>
    <form method="post" action="{% url 'task_delete' task.id %}">
      {% csrf_token %}
      <button type="submit"class="btn"><i class="bi bi-trash text-danger"></i></button>
    </form>
  </li>
  {% endfor %}
</ul>

<div class="card mt-2">
    <form method="post" action="{% url 'task_create'%}" class="d-flex justify-content-between align-items-center">
      {% csrf_token %}
      <div class="input-group">
          <input type="hidden" value="{{project.id}}" name="project"/>
          <input type="text" name="description" class="form-control" placeholder="{% trans 'New Task' %}" required/>
          <input type="submit" class="btn btn-outlin-dark" value="{% trans 'Add' %}" />
      </div>

   </form>

</div>
